<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Resgate seu Brinde - Grupo Asserth</title>
    <style>
        .asserth-bg { background-color: #f3f4f6; }
        .line-green { border-top: 4px solid #2d8a42; width: 50px; }
        .line-orange { border-top: 4px solid #f6a01a; width: 50px; }
        .line-red { border-top: 4px solid #d32f2f; width: 50px; }
        .event-footer-bg { background-color: #1f2937; }
        /* Centralização Vertical Absoluta entre os logos */
        .content-area { min-height: 420px; display: flex; flex-direction: column; justify-content: center; }
    </style>
</head>
<body class="asserth-bg flex items-center justify-center min-h-screen p-4 font-sans">

    <div class="bg-white rounded-3xl shadow-xl max-w-sm w-full relative overflow-hidden border border-gray-100">
        
        <!-- Topo Asserth -->
        <div class="flex space-x-1 mt-8 mb-6 justify-center">
            <div class="line-red"></div>
            <div class="line-orange"></div>
            <div class="line-green"></div>
        </div>

        <div class="flex justify-center mb-4 px-8">
            <img src="https://www.grupoasserth.com.br/wp-content/uploads/2021/10/asserth.png" alt="Grupo Asserth" class="h-12 w-auto object-contain">
        </div>

        <div class="content-area">
            <div id="mainContent">
                <div class="text-center mb-6 px-8">
                    <h2 class="text-2xl font-black text-gray-900 uppercase">Resgate seu brinde</h2>
                    <p class="text-gray-600 mt-2 text-sm italic">Preencha os dados abaixo e receba seu brinde.</p>
                </div>
                
                <form id="prospeccaoForm" class="space-y-4 px-8 mb-8">
                    <input type="text" id="name" placeholder="Nome Completo" required class="w-full p-3 bg-gray-50 border border-gray-200 rounded-xl outline-none focus:ring-2 focus:ring-green-600 transition">
                    <input type="text" id="position" placeholder="Cargo" required class="w-full p-3 bg-gray-50 border border-gray-200 rounded-xl outline-none focus:ring-2 focus:ring-green-600 transition">
                    <input type="tel" id="phone" placeholder="WhatsApp" required class="w-full p-3 bg-gray-50 border border-gray-200 rounded-xl outline-none focus:ring-2 focus:ring-green-600 transition">
                    <input type="email" id="email" placeholder="E-mail" required class="w-full p-3 bg-gray-50 border border-gray-200 rounded-xl outline-none focus:ring-2 focus:ring-green-600 transition">
                    
                    <button type="submit" id="btnEnviar" class="w-full bg-gray-900 text-white font-bold py-4 rounded-2xl hover:bg-black transition-all uppercase tracking-widest shadow-lg">
                        ENVIAR
                    </button>
                </form>
            </div>

            <!-- Sucesso centralizado e limpo -->
            <div id="responseMsg" class="hidden px-8 text-center bg-white">
                <div class="text-6xl text-green-600 mb-6 font-bold">✓</div>
                <h2 class="text-3xl font-black text-gray-900 uppercase italic leading-tight">GRAVADO COM SUCESSO!</h2>
            </div>
        </div>

        <div class="event-footer-bg p-6 flex justify-center items-center">
            <img src="https://tdstorage.s3.sa-east-1.amazonaws.com/WiJloDcfmYh0.png" alt="RH Summit" class="h-10 w-auto object-contain">
        </div>
    </div>

    <script>
        const webhookBase = 'https://grupoasserth.bitrix24.com.br/rest/1/ymcq9u5562s4tmam/';

        document.getElementById('prospeccaoForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnEnviar');
            btn.disabled = true;
            btn.innerText = "PROCESSANDO...";

            const payload = {
                nome: document.getElementById('name').value,
                cargo: document.getElementById('position').value,
                fone: document.getElementById('phone').value,
                email: document.getElementById('email').value
            };

            try {
                // Criar Contato
                const respContato = await fetch(`${webhookBase}crm.contact.add.json`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        fields: {
                            "NAME": payload.nome,
                            "POST": payload.cargo,
                            "PHONE": [{ "VALUE": payload.fone, "VALUE_TYPE": "WORK" }],
                            "EMAIL": [{ "VALUE": payload.email, "VALUE_TYPE": "WORK" }]
                        }
                    })
                });
                
                const resContato = await respContato.json();
                const contatoId = resContato.result;

                // Criar Negócio com Tripla Verificação de Fonte
                await fetch(`${webhookBase}crm.deal.add.json`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        fields: {
                            "TITLE": `Negócio: ${payload.nome} (RH Summit 2026)`,
                            "CATEGORY_ID": 94,
                            "STAGE_ID": "C94:NEW",
                            "CONTACT_ID": contatoId,
                            
                            // 1. Fonte Nativa (Tentativa com ID String)
                            "SOURCE_ID": "2028", 
                            
                            // 2. Identificador de Origem (Essencial para Relatórios BI)
                            "ORIGINATOR_ID": "GITHUB_FORM",
                            "ORIGIN_ID": "RH_SUMMIT_2026",
                            
                            // 3. Campos de Rastreabilidade UTM
                            "UTM_SOURCE": "RH Summit",
                            "UTM_CAMPAIGN": "RH Summit 2026",
                            
                            "UF_CRM_1630004286": payload.cargo,
                            "COMMENTS": "FONTE: RH SUMMIT 2026 | Capturado via formulário."
                        }
                    })
                });

                document.getElementById('mainContent').style.display = 'none';
                document.getElementById('responseMsg').classList.remove('hidden');

            } catch (err) {
                alert("Erro ao enviar. Tente novamente.");
                btn.disabled = false;
                btn.innerText = "ENVIAR";
            }
        });
    </script>
</body>
</html>
